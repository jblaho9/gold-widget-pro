plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.goldwidget.pro'
    compileSdk 34

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.goldwidget.pro"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Read credentials from local.properties (gitignored) — never hardcode secrets
        def props = new Properties()
        def localProps = rootProject.file('local.properties')
        if (localProps.exists()) props.load(localProps.newDataInputStream())
        buildConfigField "String", "CTRADER_CLIENT_ID",     "\"${props.getProperty('ctrader.client_id', '')}\""
        buildConfigField "String", "CTRADER_CLIENT_SECRET", "\"${props.getProperty('ctrader.client_secret', '')}\""
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "gold-widget-pro-${variant.buildType.name}.apk"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
